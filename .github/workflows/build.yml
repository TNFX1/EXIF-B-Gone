name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Repo Cek
        uses: actions/checkout@v4

      - name: NW.js Birlestir ve Hazirla
        shell: powershell
        run: |
          $nwVersion = "v0.85.0"
          $nwZip = "nwjs-$nwVersion-win-x64.zip"
          $nwUrl = "https://dl.nwjs.io/$nwVersion/$nwZip"
          
          Invoke-WebRequest -Uri $nwUrl -OutFile $nwZip
          Expand-Archive -Path $nwZip -DestinationPath .
          
          Compress-Archive -Path "index.html", "app.js", "package.json" -DestinationPath "app.zip" -Force
          Rename-Item -Path "app.zip" -NewName "app.nw" -Force
          
          $nwFolder = "nwjs-$nwVersion-win-x64"
          cmd /c "copy /b `"$nwFolder\nw.exe`" + app.nw `"$nwFolder\EXIF-B-Gone.exe`""
          
          New-Item -ItemType Directory -Force -Path "dist\win-unpacked"
          Copy-Item -Path "$nwFolder\*" -Destination "dist\win-unpacked" -Recurse -Force

      - name: Portable Zip Olustur
        shell: powershell
        run: |
          Compress-Archive -Path "dist\win-unpacked\*" -DestinationPath "Output\EXIF-B-Gone-Portable.zip" -Force

      - name: installer.iss Versiyonunu Guncelle
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          if (-not $ver) { $ver = "1.5.0" }
          (Get-Content installer.iss) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$ver`"" | Set-Content installer.iss

      - name: Inno Setup ile Setup.exe Olustur
        shell: powershell
        run: |
          choco install innosetup -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Release Olustur
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            Output/EXIF-B-Gone-Setup-x64.exe
            Output/EXIF-B-Gone-Portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}