name: Build Desktop App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Repo'yu Çek
      uses: actions/checkout@v3

    - name: Node.js Kur
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: NW.js ile .exe Paketle
      run: |
        npx --yes nwjs-builder-phoenix --platforms win64 --outputDir dist .

    - name: Release Oluştur ve .exe Yükle
      uses: softprops/action-gh-release@v1
      with:
        files: dist/EXIF-B-Gone/win64/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}